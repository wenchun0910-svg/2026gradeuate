<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>臺中市長安國小第十七屆 - 畢業祝福牆</title>
    <style>
        /* ================= 長安國小 專屬配色與全域變數 ================= */
        :root {
            --ca-blue: #1E3A8A;     /* 長安藍 */
            --ca-blue-dark: #172554;
            --ca-yellow: #FBBF24;   /* 榮耀黃 */
            --ca-green: #32CD32;    /* 點綴綠 */
            --bg-light: #fdfbfb;    /* 淺色背景 */
            --text-main: #333333;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Microsoft JhengHei', 'PingFang TC', sans-serif;
            overflow: hidden;
            background-color: var(--bg-light);
            color: var(--text-main);
            transition: background 0.5s;
        }

        .hidden-view { display: none !important; }

        /* ---------------- 共用元件：長安校徽 (毛毛蟲吉祥物) ---------------- */
        .school-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap; /* 允許小螢幕換行 */
        }
        .school-logo svg {
            width: clamp(80px, 15vw, 150px);
            height: auto;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15));
        }
        .school-logo h1 {
            margin: 0;
            font-size: clamp(1.3rem, 4vw, 2.2rem);
            color: var(--ca-blue);
            letter-spacing: 2px;
            text-align: center;
        }

        /* ================= 視圖 1：送上祝福表單 (#submit) ================= */
        #view-submit {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
            color: var(--text-main);
            overflow-y: auto;
            align-items: center;
            padding: 30px 15px;
        }

        .form-card {
            background: white;
            border-top: 8px solid var(--ca-blue);
            border-radius: 15px;
            padding: 30px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .form-card h2 {
            text-align: center; color: var(--ca-blue); margin-top: 0;
            border-bottom: 2px dashed #eee; padding-bottom: 15px; margin-bottom: 25px;
        }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: bold; color: #555; }
        .form-group input, .form-group textarea {
            width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px;
            font-size: 16px; box-sizing: border-box; background: #fafafa; transition: 0.3s;
        }
        .form-group input:focus, .form-group textarea:focus {
            outline: none; border-color: var(--ca-blue);
            box-shadow: 0 0 0 3px rgba(30, 58, 138, 0.2); background: white;
        }

        .submit-btn {
            width: 100%; background: var(--ca-blue); color: white; border: none;
            padding: 15px; border-radius: 8px; font-size: 1.2rem; font-weight: bold;
            cursor: pointer; transition: 0.2s;
        }
        .submit-btn:hover { background: var(--ca-blue-dark); transform: translateY(-2px); }
        .submit-btn:disabled { background: #999; cursor: not-allowed; transform: none; }
        .back-to-wall { display: block; text-align: center; margin-top: 20px; color: #666; text-decoration: none; font-size: 0.9rem; }

        /* ================= 視圖 2：畢業祝福牆 (#wall) ================= */
        #view-wall {
            display: flex; flex-direction: column; height: 100vh;
            background: var(--bg-light);
            position: relative;
        }

        /* 輪播背景容器 */
        #bg-carousel {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: background-image 1s ease-in-out; /* 平滑淡入淡出 */
            pointer-events: none;
        }
        
        /* 淺色系毛玻璃遮罩 (確保文字清晰) */
        .bg-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.25); /* 降低白底濃度，讓背景顯現 */
            backdrop-filter: blur(3px); /* 降低模糊度 */
            -webkit-backdrop-filter: blur(3px);
            z-index: 1;
            pointer-events: none;
        }

        .wall-header { 
            text-align: center; padding: 20px 0; z-index: 10; 
            background: rgba(255, 255, 255, 0.85);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .wall-layout {
            display: flex; flex: 1; padding: 0 40px 40px 40px; gap: 60px;
            z-index: 10; height: calc(100vh - 120px); box-sizing: border-box; align-items: center;
        }

        /* 左側：QRCode 區 */
        .qr-section {
            flex: 0.8; max-width: 400px; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,1); border-radius: 20px;
            padding: 30px; text-align: center;
        }
        .qr-section h3 { color: var(--ca-blue); font-size: clamp(1.5rem, 4vw, 2rem); margin-top: 0; margin-bottom: 15px; }
        .qr-section p { font-size: clamp(1rem, 3vw, 1.3rem); color: #555; margin-bottom: 30px; line-height: 1.5; font-weight: bold;}
        .qr-box { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 0 20px rgba(30, 58, 138, 0.15); margin-bottom: 20px; }
        .qr-box img { width: clamp(120px, 30vw, 220px); height: clamp(120px, 30vw, 220px); display: block; }

        /* 右側：輪轉祝福區 (Carousel) */
        .carousel-section {
            flex: 1.2; position: relative; height: 100%;
            display: flex; align-items: center; justify-content: center;
        }

        .carousel-container {
            position: relative; width: 100%; max-width: 800px; min-height: 400px;
        }

        .carousel-card {
            position: absolute; top: 50%; left: 0; width: 100%;
            transform: translateY(-150%) scale(0.85); /* 預設：在上方且略小 */
            opacity: 0;
            background: rgba(255, 255, 255, 0.95); color: var(--text-main);
            border-left: 10px solid var(--ca-yellow);
            padding: 40px; border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            transition: opacity 1s ease, transform 1s ease;
            box-sizing: border-box;
            pointer-events: none;
            z-index: 1;
        }
        
        .carousel-card.active {
            opacity: 1; transform: translateY(-50%) scale(1); pointer-events: auto;
            z-index: 2;
        }

        .carousel-card.exit {
            opacity: 0; transform: translateY(50%) scale(0.85); /* 退場：往下方滑落 */
            z-index: 1;
        }
        
        .carousel-card .target { color: var(--ca-blue); font-size: clamp(1.2rem, 3vw, 1.6rem); font-weight: bold; margin-bottom: 15px; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        .carousel-card .msg { font-size: clamp(1.5rem, 5vw, 2.5rem); line-height: 1.5; font-weight: bold; word-wrap: break-word; color: #222;}
        .carousel-card .sender { margin-top: 25px; text-align: right; font-size: clamp(1.2rem, 4vw, 1.8rem); color: #d97706; font-weight: bold; }

        /* ================= 提示框與管理員 Modal ================= */
        #toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: var(--ca-blue); color: white;
            padding: 15px 30px; border-radius: 30px; z-index: 2000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            opacity: 0; visibility: hidden; transition: 0.3s;
            font-weight: bold; font-size: 1.2rem;
        }
        #toast.show { opacity: 1; visibility: visible; top: 40px;}

        .admin-btn {
            position: fixed; bottom: 20px; right: 20px;
            background: rgba(30, 58, 138, 0.1); color: var(--ca-blue);
            border: 1px solid rgba(30, 58, 138, 0.3); border-radius: 50%; width: 50px; height: 50px;
            font-size: 24px; cursor: pointer; z-index: 100; transition: 0.3s;
            backdrop-filter: blur(5px);
        }
        .admin-btn:hover { color: white; background: var(--ca-blue); transform: rotate(90deg); }

        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(5px);
            z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-content {
            background: white; color: #333; padding: 30px; border-radius: 15px;
            width: 90%; max-width: 700px; max-height: 85vh; overflow-y: auto; position: relative;
        }
        .close-modal { position: absolute; top: 20px; right: 25px; font-size: 30px; cursor: pointer; color: #888; }
        .close-modal:hover { color: #000; }
        
        .admin-section { margin-bottom: 25px; padding-bottom: 20px; border-bottom: 1px solid #eee; }
        .admin-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .admin-table th, .admin-table td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        .admin-table th { background: #f5f5f5; color: var(--ca-blue); }
        .btn-del { background: #ef4444; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
        .btn-del:hover { background: #dc2626; }
        
        .flex-row { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; }
        .admin-input { padding: 10px; border: 1px solid #ccc; border-radius: 6px; flex: 1; font-size: 16px; }
        .btn-action { padding: 10px 20px; background: var(--ca-blue); color: white; border: none; border-radius: 6px; cursor: pointer; }
        
        /* 響應式排版 Media Queries */
        @media (max-width: 900px) {
            .wall-layout { flex-direction: column; overflow-y: auto; padding: 15px; gap: 20px; height: auto; justify-content: flex-start;}
            #view-wall { height: auto; min-height: 100vh; overflow-y: auto;}
            .qr-section { margin-bottom: 10px; max-width: 100%; flex: none; padding: 20px;}
            
            .carousel-section { flex: none; width: 100%; min-height: 350px; margin-bottom: 50px; display: flex; align-items: flex-start;}
            .carousel-container { min-height: 350px; }
            .carousel-card { padding: 25px; border-left-width: 8px; }
        }
    </style>
</head>
<body>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, getDoc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ================= 1. 系統與 Firebase 初始化 =================
         const firebaseConfig = {
  apiKey: "AIzaSyCnHAgkXvben7eh2OMGtq13biiZa24EC7s",
  authDomain: "gradeuate-deadc.firebaseapp.com",
  projectId: "gradeuate-deadc",
  storageBucket: "gradeuate-deadc.firebasestorage.app",
  messagingSenderId: "30747945421",
  appId: "1:30747945421:web:955c16cec04af65e473c84"
};

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'changan-school-app';
        
        // Firestore 集合路徑
        const MSG_PATH = `artifacts/${appId}/public/data/blessings`;
        const CONFIG_COLLECTION = `artifacts/${appId}/public/data/config`; // 管理設定存放處

        let currentUser = null;
        let messagesData = [];
        let carouselInterval = null;
        let activeCardIndex = 0;
        let isAdminLoggedIn = false;
        
        // 背景輪播變數
        let customBgUrls = [];
        let currentBgIndex = 0;
        let bgRotationInterval = null;

        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (e) { console.error("Auth Error", e); }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                loadMessages();
                initAdminConfig();
                listenToBackgrounds();
            }
        });

        initAuth();

        // 確保密碼設定檔存在
        async function initAdminConfig() {
            if(!currentUser) return;
            const configRef = doc(db, CONFIG_COLLECTION, 'admin');
            try {
                const snap = await getDoc(configRef);
                if (!snap.exists()) {
                    await setDoc(configRef, { password: "1234" });
                }
            } catch(e) { console.error(e); }
        }

        // 監聽並套用背景輪播設定
        function listenToBackgrounds() {
            if(!currentUser) return;
            const bgRef = doc(db, CONFIG_COLLECTION, 'backgrounds');
            onSnapshot(bgRef, (snap) => {
                if(snap.exists()) {
                    customBgUrls = snap.data().urls || [];
                } else {
                    customBgUrls = [];
                }
                updateWallBackground();
                if(isAdminLoggedIn) renderBgInputs();
            });
        }

        // 轉換 Google Drive 網址為直連網址
        function convertGoogleDriveUrl(url) {
            if (!url) return url;
            // 擷取 Google Drive 連結中的檔案 ID
            const match = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/) || url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
            if (match && match[1]) {
                return `https://drive.google.com/uc?export=view&id=${match[1]}`;
            }
            return url;
        }

        function updateWallBackground() {
            const carouselEl = document.getElementById('bg-carousel');
            const validUrls = customBgUrls.filter(url => url && url.trim() !== '');
            
            if (bgRotationInterval) clearInterval(bgRotationInterval);

            if(validUrls.length === 0) {
                carouselEl.style.backgroundImage = 'none';
                return;
            }

            if(currentBgIndex >= validUrls.length) currentBgIndex = 0;
            
            // 使用轉換函數處理網址
            const displayUrl = convertGoogleDriveUrl(validUrls[currentBgIndex]);
            carouselEl.style.backgroundImage = `url("${displayUrl}")`;

            // 設定 60 秒輪播
            if(validUrls.length > 1) {
                bgRotationInterval = setInterval(() => {
                    currentBgIndex = (currentBgIndex + 1) % validUrls.length;
                    const nextUrl = convertGoogleDriveUrl(validUrls[currentBgIndex]);
                    carouselEl.style.backgroundImage = `url("${nextUrl}")`;
                }, 60000); 
            }
        }

        // ================= 2. SPA 路由控制 =================
        function handleRouting() {
            const hash = window.location.hash || '#wall';
            const viewSubmit = document.getElementById('view-submit');
            const viewWall = document.getElementById('view-wall');

            if (hash === '#submit') {
                viewWall.classList.add('hidden-view');
                viewSubmit.classList.remove('hidden-view');
                if(carouselInterval) clearInterval(carouselInterval);
            } else {
                viewSubmit.classList.add('hidden-view');
                viewWall.classList.remove('hidden-view');
                
                const currentUrl = window.location.href.split('#')[0];
                const submitUrl = currentUrl + '#submit';
                document.getElementById('qrImage').src = `https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=${encodeURIComponent(submitUrl)}&color=1E3A8A`;
                
                if(messagesData.length > 0) startCarousel();
            }
        }
        window.addEventListener('hashchange', handleRouting);
        handleRouting();

        // ================= 3. 資料庫操作 =================
        window.showToast = function(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function loadMessages() {
            if (!currentUser) return;
            const msgCollection = collection(db, MSG_PATH);
            
            onSnapshot(msgCollection, (snapshot) => {
                const msgs = [];
                snapshot.forEach((doc) => { msgs.push({ id: doc.id, ...doc.data() }); });
                // 依時間排序 (最新在最前)
                messagesData = msgs.sort((a, b) => b.timestamp - a.timestamp);
                
                if (window.location.hash !== '#submit') {
                    renderCarouselDOM();
                }
                if (isAdminLoggedIn) renderAdminTable();
            }, (error) => { console.error("Listen failed", error); });
        }

        document.getElementById('wishForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!currentUser) return showToast("連線中，請稍候");
            const btn = document.getElementById('submitBtn');
            btn.disabled = true; btn.innerText = "傳送中...";

            const newMsg = {
                guestName: document.getElementById('guestName').value.trim(),
                targetName: document.getElementById('targetName').value.trim(),
                message: document.getElementById('message').value.trim(),
                timestamp: Date.now()
            };

            try {
                await addDoc(collection(db, MSG_PATH), newMsg);
                showToast("🎉 祝福已成功送出！");
                document.getElementById('wishForm').reset();
            } catch (error) {
                showToast("送出失敗，請重試");
            } finally {
                btn.disabled = false; btn.innerText = "送出祝福 🚀";
            }
        });

        // ================= 4. 輪轉動畫邏輯 (Carousel) =================
        function escapeHtml(unsafe) {
            return (unsafe || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }

        function renderCarouselDOM() {
            const container = document.getElementById('carouselContainer');
            if (messagesData.length === 0) {
                container.innerHTML = `<div class="carousel-card active" style="text-align:center"><div class="msg">目前尚無祝福，快掃描左方 QR Code 搶頭香吧！</div></div>`;
                return;
            }

            let html = '';
            messagesData.forEach((msg, idx) => {
                html += `
                    <div class="carousel-card" id="card-${idx}">
                        <div class="target">To: ${escapeHtml(msg.targetName)}</div>
                        <div class="msg">${escapeHtml(msg.message).replace(/\n/g, '<br>')}</div>
                        <div class="sender">—— ${escapeHtml(msg.guestName)}</div>
                    </div>
                `;
            });
            container.innerHTML = html;
            startCarousel();
        }

        function startCarousel() {
            if(carouselInterval) clearInterval(carouselInterval);
            if(messagesData.length === 0) return;

            if(activeCardIndex >= messagesData.length) activeCardIndex = 0;
            
            const updateCards = () => {
                document.querySelectorAll('.carousel-card').forEach(el => {
                    if (el.classList.contains('active')) {
                        el.classList.remove('active');
                        el.classList.add('exit');
                    } else if (el.id !== `card-${activeCardIndex}`) {
                        el.classList.remove('exit');
                    }
                });
                
                const target = document.getElementById(`card-${activeCardIndex}`);
                if(target) {
                    if (target.classList.contains('exit')) {
                        target.style.transition = 'none';
                        target.classList.remove('exit');
                        void target.offsetWidth; 
                        target.style.transition = '';
                    }
                    target.classList.add('active'); 
                }
            };
            
            updateCards();

            if(messagesData.length > 1) {
                carouselInterval = setInterval(() => {
                    activeCardIndex = (activeCardIndex + 1) % messagesData.length;
                    updateCards();
                }, 6000); 
            }
        }

        // ================= 5. 管理員功能 =================
        window.openAdminModal = () => {
            document.getElementById('adminModal').style.display = 'flex';
            document.getElementById('adminPassword').value = '';
        };
        
        window.closeAdminModal = () => {
            document.getElementById('adminModal').style.display = 'none';
        };

        window.verifyLogin = async () => {
            if(!currentUser) return;
            const input = document.getElementById('adminPassword').value;
            try {
                const snap = await getDoc(doc(db, CONFIG_COLLECTION, 'admin'));
                const realPass = snap.exists() ? snap.data().password : '1234';
                if(input === realPass) {
                    isAdminLoggedIn = true;
                    document.getElementById('loginSection').style.display = 'none';
                    document.getElementById('adminPanel').style.display = 'block';
                    renderAdminTable();
                    renderBgInputs();
                    showToast("✅ 登入成功");
                } else {
                    showToast("❌ 密碼錯誤");
                }
            } catch(e) { showToast("發生錯誤"); }
        };

        window.changePassword = async () => {
            if(!currentUser) return;
            const newPass = document.getElementById('newPassword').value.trim();
            if(!newPass) return showToast("請輸入新密碼");
            try {
                await setDoc(doc(db, CONFIG_COLLECTION, 'admin'), { password: newPass });
                showToast("✅ 密碼已更新");
                document.getElementById('newPassword').value = '';
            } catch(e) { showToast("修改失敗"); }
        };

        // 渲染背景設定輸入框 (7個)
        window.renderBgInputs = () => {
            const container = document.getElementById('bgInputsContainer');
            container.innerHTML = '';
            for(let i=0; i<7; i++) {
                const val = customBgUrls[i] || '';
                container.innerHTML += `
                    <div class="flex-row">
                        <span style="width: 25px; color:#666;">${i+1}.</span>
                        <input type="text" id="bg-input-${i}" class="admin-input" placeholder="https://..." value="${val}">
                    </div>
                `;
            }
        };

        // 儲存背景設定
        window.saveBackgrounds = async () => {
            if(!currentUser) return;
            const newUrls = [];
            for(let i=0; i<7; i++) {
                const input = document.getElementById(`bg-input-${i}`).value.trim();
                newUrls.push(input);
            }
            try {
                await setDoc(doc(db, CONFIG_COLLECTION, 'backgrounds'), { urls: newUrls });
                showToast("✅ 背景設定已儲存");
            } catch(e) {
                showToast("儲存失敗");
            }
        };

        window.renderAdminTable = () => {
            const tbody = document.getElementById('adminTableBody');
            tbody.innerHTML = '';
            messagesData.forEach(msg => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${escapeHtml(msg.guestName)}</td>
                    <td>${escapeHtml(msg.targetName)}</td>
                    <td>${escapeHtml(msg.message).substring(0, 15)}...</td>
                    <td><button class="btn-del" onclick="deleteMessage('${msg.id}')">刪除</button></td>
                `;
                tbody.appendChild(tr);
            });
        };

        window.deleteMessage = async (id) => {
            if(!currentUser) return;
            if(!confirm("確定要刪除這筆留言嗎？")) return;
            try {
                await deleteDoc(doc(db, MSG_PATH, id));
                showToast("🗑️ 已刪除留言");
            } catch(e) { showToast("刪除失敗"); }
        };

    </script>
</body>
</html>
