<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台中市長安國小 - 畢業祝福牆</title>
    <style>
        /* ================= 長安國小 專屬配色與全域變數 ================= */
        :root {
            --ca-blue: #1E3A8A;     /* 長安藍 */
            --ca-blue-dark: #172554;
            --ca-yellow: #FBBF24;   /* 榮耀黃 */
            --ca-yellow-light: #FDE047;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --text-main: #333333;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Microsoft JhengHei', 'PingFang TC', sans-serif;
            overflow: hidden; /* 預設隱藏捲軸 */
            background-color: var(--ca-blue-dark);
            color: white;
            transition: background 0.5s;
        }

        /* 隱藏不同頁面的類別 */
        .hidden-view {
            display: none !important;
        }

        /* ---------------- 共用元件：長安校徽 SVG ---------------- */
        .school-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        .school-logo svg {
            width: 60px;
            height: 60px;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }
        .school-logo h1 {
            margin: 0;
            font-size: 2.2rem;
            color: var(--ca-yellow);
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        /* ================= 視圖 1：送上祝福表單 (#submit) ================= */
        #view-submit {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
            color: var(--text-main);
            overflow-y: auto;
            align-items: center;
            padding: 30px 15px;
        }

        #view-submit .school-logo h1 {
            color: var(--ca-blue);
            text-shadow: none;
        }

        .form-card {
            background: white;
            border-top: 8px solid var(--ca-blue);
            border-radius: 15px;
            padding: 30px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .form-card h2 {
            text-align: center;
            color: var(--ca-blue);
            margin-top: 0;
            border-bottom: 2px dashed #eee;
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
            background: #fafafa;
            transition: 0.3s;
        }
        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--ca-blue);
            box-shadow: 0 0 0 3px rgba(30, 58, 138, 0.2);
            background: white;
        }

        .submit-btn {
            width: 100%;
            background: var(--ca-blue);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .submit-btn:hover { background: var(--ca-blue-dark); transform: translateY(-2px); }
        .submit-btn:disabled { background: #999; cursor: not-allowed; transform: none; }

        .back-to-wall {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #666;
            text-decoration: none;
            font-size: 0.9rem;
        }

        /* ================= 視圖 2：畢業祝福牆 (#wall) ================= */
        #view-wall {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: radial-gradient(circle at center, var(--ca-blue) 0%, var(--ca-blue-dark) 100%);
            position: relative;
        }

        /* 星空背景動畫 */
        .stars-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #eee, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 40px 70px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 50px 160px, #ddd, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 90px 40px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 130px 80px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 160px 120px, #ddd, rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 200px 200px;
            animation: starsAnim 40s linear infinite;
        }
        @keyframes starsAnim { 0% { background-position: 0 0; } 100% { background-position: 0 -200px; } }

        .wall-header {
            text-align: center;
            padding: 20px 0;
            z-index: 10;
            background: linear-gradient(180deg, rgba(23, 37, 84, 0.9) 0%, transparent 100%);
        }

        .wall-layout {
            display: flex;
            flex: 1;
            padding: 0 40px 40px 40px;
            gap: 40px;
            z-index: 10;
            height: calc(100vh - 120px);
            box-sizing: border-box;
        }

        /* 左側：QRCode 引導區 */
        .qr-section {
            flex: 1;
            max-width: 350px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
        }
        .qr-section h3 {
            color: var(--ca-yellow);
            font-size: 1.8rem;
            margin-top: 0;
            margin-bottom: 10px;
        }
        .qr-section p { font-size: 1.2rem; color: #ddd; margin-bottom: 30px; line-height: 1.5; }
        .qr-box {
            background: white;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(251, 191, 36, 0.3);
            margin-bottom: 20px;
        }
        .qr-box img { width: 200px; height: 200px; display: block; }

        /* 右側：滾動祝福牆 */
        .scroll-section {
            flex: 2;
            position: relative;
            overflow: hidden;
            /* 上下漸層遮罩 */
            mask-image: linear-gradient(to bottom, transparent, black 10%, black 90%, transparent);
            -webkit-mask-image: linear-gradient(to bottom, transparent, black 10%, black 90%, transparent);
        }

        .scroll-container {
            position: absolute;
            width: 100%;
            top: 0;
        }

        .wall-card {
            background: rgba(255, 255, 255, 0.95);
            color: var(--text-main);
            border-left: 8px solid var(--ca-yellow);
            padding: 25px 30px;
            margin-bottom: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            transform: translateZ(0);
        }
        
        .wall-card .target {
            color: var(--ca-blue);
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 10px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }
        .wall-card .msg {
            font-size: 2rem;
            line-height: 1.5;
            font-weight: bold;
            word-wrap: break-word;
        }
        .wall-card .sender {
            margin-top: 15px;
            text-align: right;
            font-size: 1.4rem;
            color: #d97706; /* 深黃/橙色 */
            font-weight: bold;
        }

        /* 提示框 */
        #toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: var(--ca-blue); color: white;
            padding: 15px 30px; border-radius: 30px; z-index: 1000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            opacity: 0; visibility: hidden; transition: 0.3s;
            font-weight: bold; font-size: 1.1rem;
        }
        #toast.show { opacity: 1; visibility: visible; top: 40px;}

        /* 管理員按鈕 (隱藏在右下角) */
        .admin-btn {
            position: fixed; bottom: 20px; right: 20px;
            background: transparent; color: rgba(255,255,255,0.2);
            border: none; font-size: 20px; cursor: pointer; z-index: 100;
        }
        .admin-btn:hover { color: white; }

        @media (max-width: 900px) {
            .wall-layout { flex-direction: column; overflow-y: auto; padding: 15px; mask-image: none; height: auto; display: block;}
            #view-wall { height: auto; min-height: 100vh; overflow-y: auto;}
            .qr-section { margin-bottom: 30px; max-width: 100%;}
            .scroll-section { overflow: visible; height: auto; }
            .scroll-container { position: relative; transform: none !important;} /* 手機板取消動畫，直接顯示 */
        }
    </style>
</head>
<body>

    <!-- ================= 共用組件 ================= -->
    <div id="toast">提示訊息</div>

    <!-- 背景星空 (僅在 Wall 顯示) -->
    <div class="stars-bg" id="starsBg"></div>

    <!-- ================= 視圖 1：送上祝福 (手機填寫端) ================= -->
    <div id="view-submit" class="hidden-view">
        <div class="school-logo" style="margin-top: 20px;">
            <!-- 長安國小 盾牌/書本 意象校徽 SVG -->
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <circle cx="50" cy="50" r="45" fill="#1E3A8A" stroke="#FBBF24" stroke-width="4"/>
                <!-- 書本/樹苗意象 -->
                <path d="M 50 35 C 35 35 25 45 25 60 C 25 70 35 80 50 85 C 65 80 75 70 75 60 C 75 45 65 35 50 35 Z" fill="#FBBF24"/>
                <path d="M 50 35 V 85" stroke="#1E3A8A" stroke-width="2"/>
                <text x="50" y="55" fill="#1E3A8A" font-size="16" font-weight="bold" text-anchor="middle">長安</text>
                <text x="50" y="75" fill="#1E3A8A" font-size="12" font-weight="bold" text-anchor="middle">國小</text>
            </svg>
            <h1>長安國小 畢業祝福</h1>
        </div>

        <div class="form-card">
            <h2>✨ 寫下您的祝福 ✨</h2>
            <form id="wishForm">
                <div class="form-group">
                    <label>您的姓名 / 稱謂</label>
                    <input type="text" id="guestName" required placeholder="例如：王小明 / 家長會長">
                </div>
                <div class="form-group">
                    <label>送給哪位畢業生 (或班級)</label>
                    <input type="text" id="targetName" required placeholder="例如：六年甲班 / 李大華">
                </div>
                <div class="form-group">
                    <label>祝福內容</label>
                    <textarea id="message" rows="5" required placeholder="寫下期許與祝福..."></textarea>
                </div>
                <button type="submit" class="submit-btn" id="submitBtn">送出祝福 🚀</button>
            </form>
        </div>
        <a href="#wall" class="back-to-wall">切換至大螢幕展示牆 (管理員用)</a>
    </div>

    <!-- ================= 視圖 2：畢業祝福牆 (大螢幕端) ================= -->
    <div id="view-wall" class="hidden-view">
        <div class="wall-header">
            <div class="school-logo">
                <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="50" cy="50" r="45" fill="white" stroke="#FBBF24" stroke-width="4"/>
                    <path d="M 50 35 C 35 35 25 45 25 60 C 25 70 35 80 50 85 C 65 80 75 70 75 60 C 75 45 65 35 50 35 Z" fill="#1E3A8A"/>
                    <path d="M 50 35 V 85" stroke="white" stroke-width="2"/>
                    <text x="50" y="55" fill="white" font-size="16" font-weight="bold" text-anchor="middle">長安</text>
                    <text x="50" y="75" fill="white" font-size="12" font-weight="bold" text-anchor="middle">國小</text>
                </svg>
                <h1>台中市長安國小 畢業祝福牆</h1>
            </div>
        </div>

        <div class="wall-layout">
            <!-- QR Code 掃描區 -->
            <div class="qr-section">
                <h3>掃描送祝福 ✨</h3>
                <p>拿起手機掃描下方 QR Code<br>您的祝福將即時顯示在螢幕上！</p>
                <div class="qr-box">
                    <img id="qrImage" src="" alt="掃描送祝福">
                </div>
                <p style="font-size:0.9rem; color:#aaa; margin-top:10px;">或輸入網址加入</p>
            </div>

            <!-- 跑馬燈留言區 -->
            <div class="scroll-section" id="displayArea">
                <div class="scroll-container" id="scrollContainer">
                    <!-- 資料載入前顯示 -->
                    <div class="wall-card"><div class="msg">載入祝福中，請稍候...</div></div>
                </div>
            </div>
        </div>
        <button class="admin-btn" onclick="clearAllData()" title="清空測試資料">⚙</button>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ================= 1. 系統與 Firebase 初始化 =================
       const firebaseConfig = {
  apiKey: "AIzaSyCnHAgkXvben7eh2OMGtq13biiZa24EC7s",
  authDomain: "gradeuate-deadc.firebaseapp.com",
  projectId: "gradeuate-deadc",
  storageBucket: "gradeuate-deadc.firebasestorage.app",
  messagingSenderId: "30747945421",
  appId: "1:30747945421:web:955c16cec04af65e473c84"
};
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'changan-school-app';
        
        // Firestore 集合路徑
        const MSG_PATH = `artifacts/${appId}/public/data/blessings`;

        let currentUser = null;
        let messagesData = [];
        let animationFrameId = null;
        let scrollPos = 0;

        // 登入驗證
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (e) {
                console.error("Auth Error", e);
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                loadMessages(); // 登入成功後開始監聽資料庫
            }
        });

        initAuth();

        // ================= 2. SPA 路由控制 (切換表單與牆) =================
        function handleRouting() {
            const hash = window.location.hash || '#wall';
            const viewSubmit = document.getElementById('view-submit');
            const viewWall = document.getElementById('view-wall');
            const starsBg = document.getElementById('starsBg');

            if (hash === '#submit') {
                // 顯示輸入畫面
                viewWall.classList.add('hidden-view');
                starsBg.style.display = 'none';
                viewSubmit.classList.remove('hidden-view');
                document.body.style.backgroundColor = '#f0f4f8';
                
                // 暫停跑馬燈動畫以節省效能
                if(animationFrameId) cancelAnimationFrame(animationFrameId);
            } else {
                // 顯示大螢幕畫面 (預設)
                viewSubmit.classList.add('hidden-view');
                starsBg.style.display = 'block';
                viewWall.classList.remove('hidden-view');
                document.body.style.backgroundColor = 'var(--ca-blue-dark)';
                
                // 動態產生 QR Code (指向表單網址)
                const currentUrl = window.location.href.split('#')[0];
                const submitUrl = currentUrl + '#submit';
                // 使用免費 API 產生 QRCode
                document.getElementById('qrImage').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(submitUrl)}&color=1E3A8A`;
                
                // 重新啟動動畫
                if(messagesData.length > 0) startSmoothScroll();
            }
        }

        // 監聽網址 Hash 改變
        window.addEventListener('hashchange', handleRouting);
        // 初次載入執行
        handleRouting();

        // ================= 3. 資料庫操作 =================
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // 讀取資料
        function loadMessages() {
            if (!currentUser) return;
            const msgCollection = collection(db, MSG_PATH);
            
            onSnapshot(msgCollection, (snapshot) => {
                const msgs = [];
                snapshot.forEach((doc) => { msgs.push({ id: doc.id, ...doc.data() }); });
                
                // 依時間排序 (最新的在前面)
                messagesData = msgs.sort((a, b) => b.timestamp - a.timestamp);
                
                // 如果目前在大螢幕畫面，就更新渲染
                if (window.location.hash !== '#submit') {
                    renderWall();
                }
            });
        }

        // 新增資料 (表單提交)
        document.getElementById('wishForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!currentUser) return showToast("資料庫連線中，請稍候");

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = "傳送中...";

            const newMsg = {
                guestName: document.getElementById('guestName').value.trim(),
                targetName: document.getElementById('targetName').value.trim(),
                message: document.getElementById('message').value.trim(),
                timestamp: Date.now()
            };

            try {
                await addDoc(collection(db, MSG_PATH), newMsg);
                showToast("🎉 祝福已成功送出！");
                document.getElementById('wishForm').reset();
            } catch (error) {
                console.error(error);
                showToast("送出失敗，請重試");
            } finally {
                btn.disabled = false;
                btn.innerText = "送出祝福 🚀";
            }
        });

        // 隱藏版管理員功能：清空資料
        window.clearAllData = async () => {
            if(!confirm("【管理員專用】確定要清空所有祝福留言嗎？")) return;
            try {
                const snapshot = await getDocs(collection(db, MSG_PATH));
                snapshot.forEach(async (docSnap) => {
                    await deleteDoc(docSnap.ref);
                });
                showToast("資料已清空");
            } catch(e) {
                console.error(e);
            }
        }

        // ================= 4. 大螢幕動畫邏輯 =================
        function escapeHtml(unsafe) {
            return (unsafe || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }

        function renderWall() {
            const container = document.getElementById('scrollContainer');
            container.innerHTML = '';

            if (messagesData.length === 0) {
                container.innerHTML = `<div class="wall-card" style="text-align:center"><div class="msg">目前尚無祝福，快掃描左方 QR Code 搶頭香吧！</div></div>`;
                return;
            }

            // 產生卡片 HTML
            const buildCards = () => {
                let html = '';
                messagesData.forEach(msg => {
                    html += `
                        <div class="wall-card">
                            <div class="target">To: ${escapeHtml(msg.targetName)}</div>
                            <div class="msg">${escapeHtml(msg.message).replace(/\n/g, '<br>')}</div>
                            <div class="sender">—— ${escapeHtml(msg.guestName)}</div>
                        </div>
                    `;
                });
                return html;
            };

            // 複製兩份以達成無縫循環滾動
            container.innerHTML = buildCards() + buildCards(); 
            startSmoothScroll();
        }

        function startSmoothScroll() {
            // 如果是在手機直式版，不啟動動畫
            if(window.innerWidth <= 900) return;

            const container = document.getElementById('scrollContainer');
            if (animationFrameId) cancelAnimationFrame(animationFrameId);

            // 如果資料量太少 (高度不夠)，不捲動
            const singleHeight = container.scrollHeight / 2;
            const viewHeight = document.getElementById('displayArea').clientHeight;
            if (singleHeight < viewHeight && messagesData.length <= 2) {
                container.style.transform = `translateY(0px)`;
                return;
            }

            scrollPos = 0;
            const speed = 0.6; // 捲動速度設定

            function scroll() {
                scrollPos += speed;
                // 當滾動超過第一份高度時重置 (無縫循環)
                if (scrollPos >= singleHeight) {
                    scrollPos = 0;
                }
                container.style.transform = `translateY(-${scrollPos}px)`;
                animationFrameId = requestAnimationFrame(scroll);
            }
            
            animationFrameId = requestAnimationFrame(scroll);
        }
    </script>
</body>
</html>
